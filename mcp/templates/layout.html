<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title or "Real-Render MCP" }}</title>
    <style>
      body { font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif; margin: 0; background: #0b0d10; color: #e6e6e6; }
      a { color: #9ad1ff; text-decoration: none; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .card { background: #12161c; border: 1px solid #1f2732; border-radius: 12px; padding: 16px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      .muted { color: #a9b2bf; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid #2a3442; font-size: 12px; }
      .btn { background: #1f6feb; border: 0; color: white; padding: 10px 12px; border-radius: 10px; cursor: pointer; }
      .btn.secondary { background: #2a3442; }
      input, select, textarea { background: #0f1318; border: 1px solid #2a3442; color: #e6e6e6; padding: 10px; border-radius: 10px; width: 100%; }
      label { display: block; margin-top: 10px; margin-bottom: 6px; font-size: 13px; color: #a9b2bf; }
      table { width: 100%; border-collapse: collapse; }
      td, th { border-bottom: 1px solid #1f2732; padding: 10px; text-align: left; font-size: 14px; }
      .topbar { border-bottom: 1px solid #1f2732; background: #0b0d10; position: sticky; top: 0; }
      .topbar .wrap { display: flex; align-items: center; justify-content: space-between; }
      .pill { padding: 8px 10px; border: 1px solid #1f2732; border-radius: 999px; }
      .danger { color: #ffb4b4; }
      .ok { color: #a7f3d0; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="wrap">
        <div>
          <strong>Real-Render MCP</strong>
          <span class="muted">local pipeline</span>
        </div>
        <div class="pill muted">Inbox: {{ inbox_dir }}</div>
      </div>
    </div>
    <div class="wrap">
      {% block body %}{% endblock %}
    </div>
  </body>
</html>
