<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title or "Open Door Cinematic — Admin" }}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; margin: 0; background: #090b0e; color: #e6e6e6; }
      a { color: #60a5fa; text-decoration: none; }
      a:hover { color: #93c5fd; }
      .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
      .card { background: #111318; border: 1px solid #1e2330; border-radius: 14px; padding: 20px; }
      .card h3 { margin-top: 0; font-size: 15px; color: #a9b2bf; font-weight: 500; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      .muted { color: #6b7280; }
      .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
      .badge.essential { background: #064e3b; color: #6ee7b7; }
      .badge.signature { background: #1e3a5f; color: #93c5fd; }
      .badge.premium { background: #451a03; color: #fbbf24; }
      .badge.status-queued { background: #422006; color: #fde68a; }
      .badge.status-processing { background: #1e3a5f; color: #60a5fa; }
      .badge.status-done { background: #064e3b; color: #34d399; }
      .badge.status-error { background: #450a0a; color: #fca5a5; }
      .btn { background: #2563eb; border: 0; color: white; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background .15s; }
      .btn:hover { background: #3b82f6; }
      .btn.secondary { background: #1e2330; }
      .btn.secondary:hover { background: #2a3142; }
      .btn.success { background: #059669; }
      .btn.success:hover { background: #10b981; }
      input, select, textarea { background: #0d0f14; border: 1px solid #1e2330; color: #e6e6e6; padding: 10px 12px; border-radius: 10px; width: 100%; font-size: 14px; }
      input:focus, select:focus { outline: none; border-color: #2563eb; }
      label { display: block; margin-top: 12px; margin-bottom: 6px; font-size: 13px; color: #9ca3af; font-weight: 500; }
      table { width: 100%; border-collapse: collapse; }
      td, th { border-bottom: 1px solid #1e2330; padding: 12px 10px; text-align: left; font-size: 13px; }
      th { color: #6b7280; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
      tr:hover td { background: #0d0f14; }
      .topbar { border-bottom: 1px solid #1e2330; background: #090b0e; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px); }
      .topbar .wrap { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; padding-bottom: 14px; }
      .nav-links { display: flex; gap: 6px; }
      .nav-links a { padding: 6px 14px; border-radius: 8px; font-size: 13px; color: #9ca3af; font-weight: 500; transition: all .15s; }
      .nav-links a:hover, .nav-links a.active { background: #1e2330; color: #e6e6e6; }
      .danger { color: #fca5a5; }
      .ok { color: #34d399; }
      .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
      .stat-box { background: #111318; border: 1px solid #1e2330; border-radius: 12px; padding: 16px; text-align: center; }
      .stat-box .num { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
      .stat-box .lbl { font-size: 11px; color: #6b7280; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
      .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e2330; font-size: 13px; }
      .detail-row:last-child { border-bottom: none; }
      .detail-label { color: #6b7280; }
      .price { color: #34d399; font-weight: 600; }
      .chart-container { position: relative; height: 200px; }
      .section-title { font-size: 13px; color: #6b7280; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
      .package-card { border: 2px solid #1e2330; border-radius: 14px; padding: 20px; text-align: center; cursor: pointer; transition: all .2s; }
      .package-card:hover { border-color: #2563eb; transform: translateY(-2px); }
      .package-card.selected { border-color: #2563eb; background: #111827; }
      .package-card .pkg-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
      .package-card .pkg-price { font-size: 28px; font-weight: 700; color: #34d399; }
      .package-card .pkg-features { font-size: 12px; color: #6b7280; margin-top: 8px; line-height: 1.6; }
      .addon-chip { display: inline-block; padding: 6px 14px; border-radius: 999px; border: 1px solid #1e2330; font-size: 13px; cursor: pointer; margin: 4px; transition: all .15s; }
      .addon-chip:hover { border-color: #2563eb; }
      .addon-chip.selected { background: #1e3a5f; border-color: #2563eb; color: #93c5fd; }
      input[type="file"] { padding: 12px; }
      .empty-state { text-align: center; padding: 60px 20px; color: #6b7280; }
      .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="wrap">
        <div>
          <strong style="font-size: 16px;">Open Door Cinematic</strong>
          <span class="muted" style="margin-left: 8px; font-size: 12px;">ADMIN</span>
        </div>
        <div class="nav-links">
          <a href="/" class="{{ 'active' if active_page == 'orders' else '' }}">Orders</a>
          <a href="/new" class="{{ 'active' if active_page == 'new' else '' }}">New Order</a>
        </div>
      </div>
    </div>
    <div class="wrap">
      {% block body %}{% endblock %}
    </div>
  </body>
</html>
